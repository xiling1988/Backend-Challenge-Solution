services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: challenge_user
      POSTGRES_PASSWORD: challenge_pass
      POSTGRES_DB: fs_challenge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata: